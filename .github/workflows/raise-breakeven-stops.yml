name: Breakeven-Stops anheben

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry-Run (nur Vorschau, keine echten Orders): true = Vorschau, false = Live'
        required: false
        default: 'true'

permissions:
  contents: write

jobs:
  raise-stops:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt
          pip install "yfinance>=0.2.54" "numpy<2.0"

      - name: Export secrets to env
        run: |
          echo "ALPACA_API_KEY=${{ secrets.ALPACA_API_KEY }}" >> $GITHUB_ENV
          echo "ALPACA_API_SECRET=${{ secrets.ALPACA_API_SECRET }}" >> $GITHUB_ENV

      - name: Run breakeven-stop check
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "false" ]; then
            echo "▶ LIVE-Modus — Stops werden in Alpaca wirklich angehoben"
            python raise_breakeven_stops.py
          else
            echo "🔍 DRY-RUN — nur Vorschau, keine echten Orders"
            python raise_breakeven_stops.py --dry-run
          fi

      - name: Commit & push aktualisiertes Journal
        if: ${{ github.event.inputs.dry_run == 'false' }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/trades.json docs/trades.html || true
          git diff --cached --quiet || git commit -m "chore: Breakeven-Stops angehoben [$(date '+%Y-%m-%d')]"
          git push
