name: Journal synchronisieren

on:
  workflow_dispatch:
    inputs:
      force:
        description: 'Force-Close: Positionen ohne gefundenen Sell-Order schliessen (exit_reason=position_closed_unknown statt offen bleiben)'
        required: false
        default: 'false'

permissions:
  contents: write

jobs:
  sync-journal:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt

      - name: Export secrets to env
        run: |
          echo "ALPACA_API_KEY=${{ secrets.ALPACA_API_KEY }}" >> $GITHUB_ENV
          echo "ALPACA_API_SECRET=${{ secrets.ALPACA_API_SECRET }}" >> $GITHUB_ENV

      - name: Run sync_journal.py
        run: |
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            python sync_journal.py --force
          else
            python sync_journal.py
          fi

      - name: Commit & push aktualisiertes Journal
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/trades.json docs/trades.html
          git diff --cached --quiet || git commit -m "chore: Journal manuell synchronisiert [$(date '+%Y-%m-%d')]"
          git push
