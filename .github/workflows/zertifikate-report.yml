name: Zertifikate-Scanner (Samstag)

on:
  schedule:
    - cron: '0 9 * * 6'   # Samstag 9:00 UTC (1h nach Haupt-Report)
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry-Run (kein E-Mail): true/false'
        required: false
        default: 'false'

permissions:
  contents: write

jobs:
  zertifikate-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt
          pip install "yfinance>=0.2.54" "numpy<2.0" python-dateutil

      - name: Export secrets to env
        run: |
          echo "MAIL_FROM=${{ secrets.MAIL_FROM }}"           >> $GITHUB_ENV
          echo "MAIL_TO=${{ secrets.MAIL_TO }}"               >> $GITHUB_ENV
          echo "SMTP_HOST=${{ secrets.SMTP_HOST }}"           >> $GITHUB_ENV
          echo "SMTP_PORT=${{ secrets.SMTP_PORT }}"           >> $GITHUB_ENV
          echo "SMTP_USER=${{ secrets.SMTP_USER }}"           >> $GITHUB_ENV
          echo "SMTP_PASS=${{ secrets.SMTP_PASS }}"           >> $GITHUB_ENV

      - name: Run Zertifikate-Scanner
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            python main_zertifikate.py --dry-run
          else
            python main_zertifikate.py
          fi

      - name: Publish to GitHub Pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --staged --quiet || git commit -m "zertifikate: report $(date +%Y-%m-%d)"
          git push
