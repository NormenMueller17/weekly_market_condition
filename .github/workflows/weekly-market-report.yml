name: Weekly US Market Report

on:
  schedule:
    # Jeden Montag 08:30 UTC (~10:30/09:30 Europe/Berlin je nach DST)
    - cron: "30 8 * * MON"
  workflow_dispatch: {}

jobs:
  run-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Export secrets to env
        run: |
          echo "MAIL_FROM=${{ secrets.MAIL_FROM }}" >> $GITHUB_ENV
          echo "MAIL_TO=${{ secrets.MAIL_TO }}" >> $GITHUB_ENV
          echo "SMTP_HOST=${{ secrets.SMTP_HOST }}" >> $GITHUB_ENV
          echo "SMTP_PORT=${{ secrets.SMTP_PORT }}" >> $GITHUB_ENV
          echo "SMTP_USER=${{ secrets.SMTP_USER }}" >> $GITHUB_ENV
          echo "SMTP_PASS=${{ secrets.SMTP_PASS }}" >> $GITHUB_ENV
          echo "UNIVERSE=${{ vars.UNIVERSE }}" >> $GITHUB_ENV
          echo "CUSTOM_TICKERS=${{ vars.CUSTOM_TICKERS }}" >> $GITHUB_ENV
          echo "LOOKBACK_WEEKS=${{ vars.LOOKBACK_WEEKS }}" >> $GITHUB_ENV

      - name: Run report
        run: |
          python -m src.main
