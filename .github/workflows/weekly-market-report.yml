name: Weekly US Market Report

on:
  schedule:
    - cron: '0 8 * * 6'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  run-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt
          pip install "yfinance>=0.2.54" "numpy<2.0"

      - name: Export secrets to env
        run: |
          echo "MAIL_FROM=${{ secrets.MAIL_FROM }}" >> $GITHUB_ENV
          echo "MAIL_TO=${{ secrets.MAIL_TO }}" >> $GITHUB_ENV
          echo "SMTP_HOST=${{ secrets.SMTP_HOST }}" >> $GITHUB_ENV
          echo "SMTP_PORT=${{ secrets.SMTP_PORT }}" >> $GITHUB_ENV
          echo "SMTP_USER=${{ secrets.SMTP_USER }}" >> $GITHUB_ENV
          echo "SMTP_PASS=${{ secrets.SMTP_PASS }}" >> $GITHUB_ENV
          echo "UNIVERSE=${{ vars.UNIVERSE }}" >> $GITHUB_ENV
          echo "CUSTOM_TICKERS=${{ vars.CUSTOM_TICKERS }}" >> $GITHUB_ENV
          echo "LOOKBACK_WEEKS=${{ vars.LOOKBACK_WEEKS }}" >> $GITHUB_ENV

      - name: Run report
        run: |
          python main.py

      - name: Run Launchpad Diagnostic
        run: |
          python launchpad_diagnostic.py
        continue-on-error: true

      - name: Publish to GitHub Pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --staged --quiet || git commit -m "report: update $(date +%Y-%m-%d)"
          git push
